<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO TITLE (German-first) -->
    <title>
      Volotech – CNC-Bearbeitung, Blechbearbeitung & industrielle Fertigung
    </title>

    <!-- SEO DESCRIPTION (German-first) -->
    <meta
      name="description"
      content="Volotech liefert CNC-Bearbeitung, Blechbearbeitung, Schweißbaugruppen, Montage und digitale RFQ-Tools für Automatisierung, Maschinenbau und industrielle Kunden in ganz Europa."
    />

    <!-- Ensure Google fully indexes everything -->
    <meta name="robots" content="index,follow" />

    <!-- Tell search engines that the main content language is German -->
    <meta http-equiv="Content-Language" content="de" />

    <!-- Optional but nice: OpenGraph (for LinkedIn, WhatsApp preview, etc.) -->
    <meta
      property="og:title"
      content="Volotech – CNC-Bearbeitung & industrielle Fertigung"
    />
    <meta
      property="og:description"
      content="CNC-Bauteile, Blechbearbeitung, Schweißbaugruppen, Montage & digitale RFQ-Tools für Maschinenbau und Automatisierung."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
